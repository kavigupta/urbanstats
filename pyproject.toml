[tool.mypy]
strict = true
python_version = "3.10"
warn_unused_ignores = true
mypy_path = "stubs"

# Third-party packages without stubs or py.typed
[[tool.mypy.overrides]]
module = [
    "geopandas.*",
    "geopandas",
    "matplotlib.*",
    "matplotlib",
    "overpy.*",
    "overpy",
    "pandas.*",
    "pandas",
    "shapely.*",
    "shapely",
    "shapely.geometry.*",
    "tqdm.*",
    "tqdm",
    "us.*",
    "us",
    "zarr.*",
    "zarr",
]
ignore_missing_imports = true

# Autogenerated protobuf stub; do not edit by hand
[[tool.mypy.overrides]]
module = "urbanstats.protobuf.data_files_pb2"
disable_error_code = ["type-arg", "misc"]
